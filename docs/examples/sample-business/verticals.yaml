    - "Pricing and package inquiries"
    - "Pre-appointment instructions and follow-up"
  ranked_features:
    - feature: "Consultation booking"
      why: "Each consult is $200-800. This is the money feature."
    - feature: "After-hours capture"
      why: "Most inquiries happen evenings/weekends when staff is gone."
    - feature: "Pricing & package answers"
      why: "Clients comparison-shop — instant answers win."
    - feature: "Text-back with booking links"
      why: "Clients text first. Instant link = instant conversion."
    - feature: "Pre-appointment instructions"
      why: "Reduces no-shows and preps clients for treatment."
