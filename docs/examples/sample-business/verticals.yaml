# Acme Front Desk Vertical Templates
# Each vertical defines its target market segment with pain points,
# revenue impact, features, language substitutions, and tone.

nail-beauty:
  display_name: "Nail & Beauty Salon"
  tier: a
  pain_points:
    - "Missed calls during appointments when hands are busy"
    - "No-shows and last-minute cancellations"
    - "Clients booking through DMs instead of calling"
  demo_hook: "Your techs can't pick up the phone mid-manicure"
  revenue_per_missed_interaction: "$40-80"
  key_features:
    - "Appointment booking and confirmation"
    - "Service menu and pricing answers"
    - "Waitlist management"
  ranked_features:
    - feature: "Appointment booking"
      why: "Hands busy = missed bookings. This is the #1 job."
    - feature: "After-hours answering"
      why: "Clients call/text evenings to book next-day slots."
    - feature: "Service menu & pricing answers"
      why: "Reduces DM back-and-forth."
    - feature: "Spam call filtering"
      why: "Emotional win — no more junk interruptions."
    - feature: "Waitlist management"
      why: "Fills cancellation gaps automatically."
  language:
    customer: "client"
    business: "salon"
    appointment: "appointment"
  tone: standard

